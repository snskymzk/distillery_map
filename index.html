<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>日本の蒸留所マップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="./assets/app.css">
</head>
<body>
<div class="app">
  <div class="map-wrap">
    <div id="map"></div>
    <div class="header-card simple-header" id="headerCard">
      <div class="header-main simple-header-main">
        <h1>日本の蒸留所マップ</h1>
      </div>
    </div>
  </div>
  <aside class="panel simple-panel" id="sidePanel">
    <div class="panel-top simple-panel-top">
      <div class="quick-filters simple-quick-filters">
        <button class="quick-pill active" data-preset="all">すべて</button>
        <button class="quick-pill" data-preset="whisky">ウイスキー</button>
        <button class="quick-pill" data-preset="gin">ジン</button>
        <button class="quick-pill" data-preset="other_spirits">その他</button>
      </div>
      <div class="primary-row simple-primary-row">
        <div class="search-wrap" id="searchWrap">
          <input id="searchInput" class="search" type="search" placeholder="蒸留所名・所在地・代表銘柄で検索">
          <div id="suggestions" class="suggestions"></div>
        </div>
        <div class="compact-row simple-compact-row">
          <label class="checkbox"><input type="checkbox" id="visitableOnly">見学できる蒸留所のみ</label>
        </div>
      </div>
      <div class="summary" id="summary"></div>
      <div id="summary"></div>
      <div class="version-info" id="versionInfo">表示バージョン: v159 / data/distilleries.public.json</div>
    </div>
    <div class="list" id="list"></div>
  </aside>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="./assets/app.js"></script>
</body>
</html>
